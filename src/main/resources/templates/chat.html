<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat App UI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body {
            background: #f5f6fa;
        }

        .chat-sidebar,
        .chat-detail {
            background: #fff;
        }

        .chat-message {
            max-width: 75%;
        }

        .chat-message.me {
            background: #007bff;
            color: #fff;
            margin-left: auto;
        }

        .chat-message.other {
            background: #f1f0f0;
            color: #222;
        }

        .chat-avatar {
            width: 40px;
            height: 40px;
            object-fit: cover;
        }

        .media-thumb {
            width: 100%;
            border-radius: 8px;
        }

        .chat-list-item.active {
            background: #f0f4ff;
        }

        .chat-list-item {
            cursor: pointer;
        }

        .chat-media-img {
            width: 80px;
            height: 60px;
            object-fit: cover;
            border-radius: 6px;
            margin-right: 4px;
        }

        .chat-media-img:last-child {
            margin-right: 0;
        }

        .chat-input-area {
            background: #fff;
        }

        @media (max-width: 767.98px) {
            .chat-input-area {
                position: fixed;
                left: 0;
                right: 0;
                bottom: 0px;
                /* height of footer navbar */
                z-index: 1051;
                box-shadow: 0 -2px 8px rgba(0, 0, 0, 0.04);
            }

            #chatArea {
                padding-bottom: 110px !important;
                /* enough for input and footer */
            }
        }

        @media (max-width: 767.98px) {
            .chat-sidebar {
                display: none !important;
            }

            .mobile-footer-nav {
                display: flex !important;
            }
        }

        @media (min-width: 768px) {
            .mobile-footer-nav {
                display: none !important;
            }
        }
    </style>
</head>

<body>
<div class="container-fluid vh-100 p-0">
    <!-- Mobile sidebar toggle button (hidden, since sidebar is hidden on mobile) -->
    <!-- <button class="btn btn-primary d-md-none m-2 position-fixed" style="z-index:1100; top:10px; left:10px;" id="sidebarToggle">
<i class="bi bi-list"></i>
</button> -->
    <div class="sidebar-backdrop" id="sidebarBackdrop" style="display:none;"></div>
    <div class="row h-100 g-0">

        <!-- Chat Area -->
        <div class="col-12 col-md-9 d-flex flex-column p-0 position-relative" id="chatArea"
             style="min-height: 100vh;">

            <div class="border-bottom p-3 d-flex align-items-center flex-shrink-0 bg-light position-sticky top-0 w-100" style="min-height:80px;z-index:1020;">
                <button onclick="history.back()" class="btn btn-light rounded-circle me-3 d-flex align-items-center justify-content-center" style="width:40px;height:40px;">
                    <i class="bi bi-arrow-left" style="font-size:1.3rem;"></i>
                </button>
                <div onclick="guest()" class="d-flex align-items-center flex-grow-1" style="cursor:pointer;">
                    <img id="Profile" src="https://randomuser.me/api/portraits/men/3.jpg" class="rounded-circle me-3" alt="Group" style="width:56px;height:56px;object-fit:cover;">
                    <div class="flex-grow-1">
                        <div class="fw-bold d-flex align-items-center" style="font-size:1.4rem;" id="nameDisplay">
                            United Family
                            <span class="ms-2" style="font-size:1.3rem;">🛡️</span>
                        </div>
<!--                        <div class="text-success" style="font-size:1.05rem;">Rashford is typing...</div>-->
                    </div>
                </div>
            </div>

            <div class="flex-grow-1 overflow-auto p-3" id="chatMessages" style="background: #f8f9fa;">


            </div>



            <div class="border-top p-3 chat-input-area flex-shrink-0" id="chatMessageInput">
                <div class="d-flex align-items-center">
                    <input type="text" id="message" class="form-control me-2" placeholder="Write a message...">
                    <button class="btn btn-primary rounded-circle" type="button" onclick="sendMessage()">
                        <i class="bi bi-send"></i>
                    </button>
                </div>
            </div>


        </div>


    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>


<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs/lib/stomp.min.js"></script>

<div th:replace="fragments/script :: script"></div>

<!--<input id="name" placeholder="Your Name"/>-->
<!--<input id="message" placeholder="Message"/>-->
<!--<button onclick="sendMessage()">Send</button>-->

<!--<ul id="chat"></ul>-->

<script>

    var senderName = localStorage.getItem("username");
    var receiverName = null;
    const username = new URLSearchParams(window.location.search).get("username");
    $(document).ready(function(){
        scrollToBottom();

        $("#chatMessages").empty();

        var gustId = null;
        const token = localStorage.getItem("token");

        $.ajax({
            url: baseUrl + "/api/v1/user/getGuestByUserName?userName=" + username,
            method: "GET",
            contentType: "application/json",

            headers: {
                "Authorization": token
            },

            success: function (response) {
                // alert("User info retrieved successfully: " + );

                const  userData = response.data;
                var image = baseUrl+"/uploads/" + userData.imageUrl;

                if(userData.guestUser != null){
                    receiverName = userData.username;
                    console.log(receiverName);
                    if(userData.guestUser.blockStatus != "BLOCKED"){
                        $("#userName").text(userData.username);
                        $("#nameDisplay").text(userData.name);
                        $("#description").text(userData.about);
                        $("#Profile").attr("src", image);
                    }else{
                        $("#userName").text('');
                        $("#nameDisplay").text('');
                        $("#description").text('');
                        $("#Profile").attr("src", baseUrl+"/uploads/"+"image.jpg");
                    }
                }else{
                    receiverName = userData.username;
                    $("#userName").text(userData.username);
                    $("#nameDisplay").text(userData.name);
                    $("#description").text(userData.about);
                    $("#Profile").attr("src", image);
                }

                if(userData.user != null) {

                    if (userData.user.blockStatus == "UNBLOCKED") {
                        $(".blockUser")
                            .html('<i class="bi bi-x-circle me-2"></i>Block')
                            .removeClass("btn-outline-success")
                            .addClass("btn-outline-danger");
                    } else {
                        $(".blockUser")
                            .html('<i class="bi bi-check-circle me-2"></i>Unblock')
                            .removeClass("btn-outline-danger")
                            .addClass("btn-outline-success");
                    }
                }else{

                    $(".blockUser")
                        .html('<i class="bi bi-x-circle me-2"></i>Block')
                        .removeClass("btn-outline-success")
                        .addClass("btn-outline-danger");
                }


                gustId = userData.gustId;




            },

            error: function (err) {
                if(err.status === 401) {
                    alert("Unauthorized. Please log in again.");
                    window.location.href = "/login";
                } else {
                    $(this).hazel('An error occurred. Please try again.', 'danger', 3000);

                }
            }
        });




        $.ajax({
            url: baseUrl + "/api/v1/chat/get-chat-messages-list?username=" + username,
            method: "GET",
            contentType: "application/json",

            headers: {
                "Authorization": token
            },

            success: function (response) {
                // alert("User info retrieved successfully: " + );

                const  data = response.data;


                data.forEach(msg => {
                    renderMessage(msg);
                });




            },

            error: function (err) {
                if(err.status === 401) {
                    alert("Unauthorized. Please log in again.");
                    window.location.href = "/login";
                } else {
                    $(this).hazel('An error occurred. Please try again.', 'danger', 3000);
                }
            }
        });


    });

    function renderMessage(msg){

        let time = new Date(msg.timestamp).toLocaleTimeString();

        if(msg.sender === senderName){

            $("#chatMessages").append(`
            <div class="mb-3 text-end">
                <div class="fw-bold">You
                    <span class="text-muted small">${time}</span>
                </div>
                <div class="chat-message me p-2 rounded shadow-sm">${msg.content}</div>
            </div>
        `);

        }else{

            $("#chatMessages").append(`
            <div class="mb-3">
                <div class="fw-bold">${msg.sender}
                    <span class="text-muted small">${time}</span>
                </div>
                <div class="chat-message other p-2 rounded shadow-sm">${msg.content}</div>
            </div>
        `);

        }
    }


    function scrollToBottom(){
        let chat = $("#chatMessages")[0];
        chat.scrollTop = chat.scrollHeight;
    }

    function guest() {
        const username = new URLSearchParams(window.location.search).get("username");
        window.location.href = "/guestProfile?username=" + username;
    }


    let stompClient = null;


    function connect() {

        let socket = new SockJS('/chatApp?username=' + senderName);
        stompClient = Stomp.over(socket);

        stompClient.connect({

        }, function(frame) {

            console.log("Connected: " + frame);

            stompClient.subscribe("/user/queue/messages", function(message) {

                let msg = JSON.parse(message.body);

                console.log(msg);

                // Only show messages for the active chat
                if(
                    (msg.sender === senderName && msg.receiver === receiverName) ||
                    (msg.sender === receiverName && msg.receiver === senderName)
                ){

                    if(msg.sender === senderName){

                        $("#chatMessages").append(`
                <div class="mb-3 text-end">
                    <div class="fw-bold">You
                        <span class="text-muted small">${new Date().toLocaleTimeString()}</span>
                    </div>
                    <div class="chat-message me p-2 rounded shadow-sm">${msg.content}</div>
                </div>
            `);

                    } else {

                        $("#chatMessages").append(`
                <div class="mb-3">
                    <div class="fw-bold">${msg.sender}
                        <span class="text-muted small">${new Date().toLocaleTimeString()}</span>
                    </div>
                    <div class="chat-message other p-2 rounded shadow-sm">${msg.content}</div>
                </div>
            `);

                    }

                }

            });
        });
    }

    function sendMessage() {




        let content = document.getElementById("message").value;

        if(content.trim() === "") {
            return;
        }

        stompClient.send("/app/private-message", {}, JSON.stringify({
            sender: senderName,
            receiver: receiverName,
            content: content
        }));
        $("#message").val("");

        $("#chatMessages").append(
            `<div class="mb-3 text-end">
                            <div class="fw-bold">You <span class="text-muted small">${new Date().toLocaleTimeString()}</span></div>
                            <div class="chat-message me p-2 rounded shadow-sm">${content}</div>
                        </div>`
        );
    }

    connect();




</script>

</body>
</html>
