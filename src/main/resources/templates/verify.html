<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Verification</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body { background: #f5f6fa; }
        .verify-container {
            max-width: 400px;
            margin: 0 auto;
            margin-top: 10vh;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 2px 16px rgba(0,0,0,0.06);
            padding: 2.5rem 2rem 2rem 2rem;
        }
        .verify-icon {
            font-size: 2.5rem;
            color: #0d6efd;
            margin-bottom: 1rem;
        }
        .verification-info {
            background: #e9f7ef;
            border-left: 4px solid #0d6efd;
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            color: #0d6efd;
            font-size: 1.05rem;
        }
        .form-control:focus {
            box-shadow: 0 0 0 2px #0d6efd33;
        }
    </style>
</head>
<body>
<div class="verify-container">
    <div class="text-center mb-4">
        <i class="bi bi-envelope-check verify-icon"></i>
        <h3 class="fw-bold mb-1">Verify Your Email</h3>
        <div class="text-muted">Enter the code sent to your email</div>
    </div>
    <div class="verification-info">
        We've sent a 6-digit verification code to <span class="fw-bold">your email address</span>.<br>
        Please enter it below to verify your account.
    </div>
    <form id="verifyForm" >
        <div class="mb-3">
            <label for="verificationCode" class="form-label">Verification Code</label>
             <input type="hidden" name="email" id="email" value="">
            <input type="text" name="otp" class="form-control text-center fw-bold" id="verificationCode" maxlength="6" placeholder="------"  style="letter-spacing:0.5em; font-size:1.5rem;">
        </div>
        <button type="button" class="btn btn-primary w-100 verifyButton">Verify</button>
<!--        <div class="text-center mt-3">-->
<!--            <small>Didn't receive the code? <a href="#">Resend</a></small>-->
<!--        </div>-->
    </form>
</div>
<div th:replace="fragments/script :: script"></div>
<script>
    const email = new URLSearchParams(window.location.search).get("email");
    $("#email").val(email);

    $(".verifyButton").click(function() {





        var otp = $("#verificationCode").val();
        if (otp) {

            $.ajax({
                url: baseUrl+"/api/v1/auth/otp-verify",
                method: "POST",
                contentType: "application/json",
                data: JSON.stringify({ otp: otp , email: email}),
                before: function() {

                    $(".verifyButton").prop("disabled", true).text("Sending...");
                },
                success: function(response) {

                    // Get token from API response
                    const token = response.data.token;

                    // Store token
                    localStorage.setItem("token", "Bearer " + token);

                    // Optional: store user info
                    localStorage.setItem("username", response.data.username);


                    $(this).hazel('OTP verified successfully!', 'danger', 3000);

                    // Redirect
                    window.location.href = "/post";
                },
                error: function(xhr, status, error) {

                    $(this).hazel('An error occurred. Please try again.', 'danger', 3000);
                }
            });
        } else {


            $(this).hazel('Please enter your email address.', 'danger', 3000);
        }
    });
</script>
</body>
</html>
