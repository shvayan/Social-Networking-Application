<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body { background: #f5f6fa; }
        .signup-container {
            max-width: 400px;
            margin: 0 auto;
            margin-top: 7vh;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 2px 16px rgba(0,0,0,0.06);
            padding: 2.5rem 2rem 2rem 2rem;
        }
        .form-control:focus {
            box-shadow: 0 0 0 2px #0d6efd33;
        }
        .logo {
            width: 56px;
            height: 56px;
            object-fit: cover;
            margin-bottom: 1rem;
        }
        .verification-info {
            background: #e9f7ef;
            border-left: 4px solid #0d6efd;
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            color: #0d6efd;
            font-size: 1.05rem;
        }
    </style>
</head>
<body>
<div class="signup-container">
    <div class="text-center mb-4">

        <h3 class="fw-bold mb-1">Sign Up</h3>
        <div class="text-muted">Welcome to our Hi!</div>
    </div>
    <form  id="LoginForm" >
        <div class="mb-4">
            <label for="signupEmail" class="form-label">Email address</label>
            <input type="email" name="email" class="form-control" id="signupEmail" placeholder="name@email.com" >
        </div>
        <button type="button" class="btn btn-primary w-100 loginButton">Sign Up</button>
    </form>
</div>
<div th:replace="fragments/script :: script"></div>

<script>
    $(".loginButton").click(function() {
        var email = $("#signupEmail").val();
        if (email) {

            $.ajax({
                url: baseUrl+"/api/v1/auth/signup", // 后端接口地址
                method: "POST",
                contentType: "application/json",
                data: JSON.stringify({ email: email }),
                before: function() {

                    $(".loginButton").prop("disabled", true).text("Sending...");
                },
                success: function(response) {


                    $(this).hazel('Verification code sent to your email!', 'danger', 3000);
                    window.location.href = "/verify?email="+email; // 跳转到验证码输入页面
                },
                error: function(xhr, status, error) {

                    $(this).hazel('Failed to send verification code. Please try again.', 'danger', 3000);


                }
            });
        } else {
            $(this).hazel('Please enter your email address.', 'danger', 3000);

        }
    });
</script>
</body>
</html>
