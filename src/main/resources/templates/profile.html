<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HelloApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body {
            background: #f5f6fa;
        }

        .profile-header {
            background: #fff;
            border-radius: 0 0 24px 24px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            padding: 2rem 1rem 1rem 1rem;
            text-align: center;
        }

        .profile-avatar {
            width: 96px;
            height: 96px;
            object-fit: cover;
            border-radius: 50%;
            border: 4px solid #fff;
            margin-top: -48px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .profile-info {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            padding: 1.5rem;
            margin-top: 1.5rem;
        }

        .profile-actions .btn {
            min-width: 120px;
        }

        @media (max-width: 767.98px) {
            .profile-header {
                padding: 1.5rem 0.5rem 1rem 0.5rem;
            }

            .profile-info {
                padding: 1rem;
            }
            .profile-info form {
                max-height: 300px;
                overflow-y: auto;
            }
        }
    </style>
</head>

<body>
<div class="container py-4">
    <div class="profile-header position-relative mb-4">
<!--        <div class="position-absolute top-0 start-0 m-2">-->
<!--            <a href="chatList.html" class="btn btn-light rounded-circle"><i class="bi bi-arrow-left"></i></a>-->
<!--        </div>-->
        <div class="position-relative d-inline-block">
            <img id="profileImage" src="https://randomuser.me/api/portraits/men/1.jpg" alt="Profile"
                 class="profile-avatar shadow">
            <label for="profileImageInput"
                   class="position-absolute bottom-0 end-0 bg-white rounded-circle p-1 border shadow"
                   style="cursor:pointer;">
                <i class="bi bi-camera" style="font-size:1.2rem;"></i>
                <input type="file" id="profileImageInput" accept="image/*" style="display:none;">
            </label>
        </div>
        <h3 id="nameDisplay" class="mt-3 mb-1">Erik Ten Hag</h3>
        <p class="text-muted mb-0" id="userName">@eriktenhag</p>
    </div>

    <div class="profile-info" id="chatArea">
        <form>
            <div class="mb-3">
                <label for="profileName" class="form-label">Name</label>
                <input type="text" class="form-control" id="profileName" value="Erik Ten Hag">
            </div>

            <div class="mb-3">
                <label for="profileAbout" class="form-label">About</label>
                <textarea class="form-control" id="profileAbout"
                          rows="3">Head coach at United Family. Passionate about football, leadership, and building winning teams. Always striving for improvement.</textarea>
            </div>
            <div class="mb-3">
                <label for="profileEmail" class="form-label">Email</label>
                <input type="email" class="form-control" id="profileEmail" value="erik.tenhag@email.com">
            </div>
            <div class="mb-3">
                <label for="profilePhone" class="form-label">Phone</label>
                <input type="tel" class="form-control" id="profilePhone" value="+44 1234 567890">
            </div>

            <div class="d-flex gap-3 justify-content-center mt-4" style="position:static; background:#fff; z-index:1;">
                <button type="button" class="btn btn-primary px-4 " onclick="profileUpdate()">Save</button>
                <a onclick="logout()" class="btn btn-outline-secondary px-4">logout</a>
            </div>
        </form>
    </div>
</div>
<div th:replace="fragments/footer :: footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Profile image live preview
    const profileImageInput = document.getElementById('profileImageInput');
    const profileImage = document.getElementById('profileImage');
    if (profileImageInput && profileImage) {
        profileImageInput.addEventListener('change', function (e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function (evt) {
                    profileImage.src = evt.target.result;
                };
                reader.readAsDataURL(file);

                const imageFile = $("#profileImageInput")[0].files[0];
                const formData = new FormData();

                if (imageFile) {
                    formData.append("file", imageFile);
                }
                $.ajax({
                    url: baseUrl + "/api/v1/user/profileImageUpload",
                    method: "POST",
                    headers: {
                        "Authorization": localStorage.getItem("token")
                    },
                    data: formData,
                    processData: false,
                    contentType: false,
                    success: function (response) {
                        location.reload();
                        $(this).hazel('Profile image updated successfully.', 'danger', 3000);

                    },
                    error: function (err) {
                        if (err.status === 401) {
                            alert("Unauthorized. Please log in again.");
                            window.location.href = "/login";
                        } else {
                            $(this).hazel('An error occurred while uploading the image. Please try again.', 'danger', 3000);


                        }
                    }

                });
            }
        });
    }

    function profileUpdate() {
        const name = $("#profileName").val();
        const about = $("#profileAbout").val();
        const email = $("#profileEmail").val();
        const phone = $("#profilePhone").val();

        $.ajax({
            url: baseUrl + "/api/v1/user/prifileUpdate",
            method: "PUT",
            contentType: "application/json",
            headers: {
                "Authorization": localStorage.getItem("token")
            },
            data: JSON.stringify({
                name: name,
                about: about,
                email: email,
                phone_number: phone
            }),
            success: function (response) {

                $(this).hazel('Profile updated successfully.', 'danger', 3000);

                location.reload();
            },
            error: function (err) {
                if (err.status === 401) {
                    alert("Unauthorized. Please log in again.");
                    window.location.href = "/login";
                } else {
                    $(this).hazel('An error occurred while updating the profile. Please try again', 'danger', 3000);

                }
            }
        });
    }


</script>
<div th:replace="fragments/script :: script"></div>
<script>
    $(document).ready(function(){
        const token = localStorage.getItem("token");

        $.ajax({
            url: baseUrl + "/api/v1/user/getUserByUserId",
            method: "GET",
            contentType: "application/json",

            headers: {
                "Authorization": token
            },

            success: function (response) {
                // alert("User info retrieved successfully: " + );
                // $(this).hazel('User info update successfully', 'danger', 3000);
                const  userData = response.data;
                $("#profileName").val(userData.name);
                $("#userName").text(userData.username);
                $("#nameDisplay").text(userData.name);
                $("#profileAbout").val(userData.about);
                $("#profileEmail").val(userData.email);
                $("#profilePhone").val(userData.phone_number);
                $("#profileImage").attr("src", userData.imageUrl);

            },

            error: function (err) {
                if(err.status === 401) {
                    alert("Unauthorized. Please log in again.");
                    window.location.href = "/login";
                } else {
                    $(this).hazel('An error occurred. Please try again.', 'danger', 3000);
                }
            }
        });

    });
    function logout() {
        localStorage.removeItem("token");
        localStorage.removeItem("username");
        window.location.href = "/login";
    }
</script>
</body>

</html>
