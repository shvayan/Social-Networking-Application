<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HelloApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body { background: #f5f6fa; }
        .profile-header {
            background: #fff;
            border-radius: 0 0 24px 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            padding: 2rem 1rem 1rem 1rem;
            text-align: center;
        }
        .profile-avatar {
            width: 96px;
            height: 96px;
            object-fit: cover;
            border-radius: 50%;
            border: 4px solid #fff;
            margin-top: -48px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .profile-info {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            padding: 1.5rem;
            margin-top: 1.5rem;
        }
        .profile-actions .btn {
            min-width: 120px;
        }
        @media (max-width: 767.98px) {
            .profile-header { padding: 1.5rem 0.5rem 1rem 0.5rem; }
            .profile-info { padding: 1rem; }
        }
    </style>
</head>
<body>
<div class="container py-4">
    <div class="profile-header position-relative mb-4">
        <div class="position-absolute top-0 start-0 m-2">
            <button onclick="history.back()" class="btn btn-light rounded-circle"><i class="bi bi-arrow-left"></i></button>
        </div>
        <img id="Profile" src="https://randomuser.me/api/portraits/men/2.jpg" alt="Profile" class="profile-avatar shadow">
        <h3 class="mt-3 mb-1" id="nameDisplay">Harry Maguire</h3>
        <p class="text-muted mb-0" id="userName">@harrymaguire</p>
    </div>
    <div class="profile-info">
        <h5 class="mb-3">About</h5>
        <p id="description">Professional footballer. Defender at United Family. Always giving my best on and off the pitch.</p>
<!--        <hr>-->
<!--        <h5 class="mb-3">Contact</h5>-->

<!--        <div class="mb-2"><i class="bi bi-geo-alt me-2"></i> Manchester, UK</div>-->
        <hr>
        <div class="profile-actions d-flex gap-3 justify-content-center mt-3">
            <a onclick="goToMessage()" class="btn btn-primary"><i class="bi bi-chat-dots me-2"></i>Message</a>
            <button type="button"  class="btn btn-outline-danger blockUser"><i class="bi bi-x-circle me-2"></i>Block</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<div th:replace="fragments/script :: script"></div>

<script>
    function goToMessage(){
        const currentUsername = localStorage.getItem("username");
        const username = new URLSearchParams(window.location.search).get("username");

        if(username === currentUsername) {
            alert("You cannot message yourself.");
            return;
        }
        window.location.href = "/chat?username=" + username;
    }
    $(document).ready(function(){
        var gustId = null;
        const token = localStorage.getItem("token");
        const username = new URLSearchParams(window.location.search).get("username");
        $.ajax({
            url: baseUrl + "/api/v1/user/getGuestByUserName?userName=" + username,
            method: "GET",
            contentType: "application/json",

            headers: {
                "Authorization": token
            },

            success: function (response) {
                // alert("User info retrieved successfully: " + );

                const  userData = response.data;
                var image = baseUrl+"/uploads/" + userData.imageUrl;

                if(userData.guestUser != null){
                    if(userData.guestUser.blockStatus != "BLOCKED"){
                        $("#userName").text(userData.username);
                        $("#nameDisplay").text(userData.name);
                        $("#description").text(userData.about);
                        $("#Profile").attr("src", image);
                    }else{
                        $("#userName").text('');
                        $("#nameDisplay").text('');
                        $("#description").text('');
                        $("#Profile").attr("src", baseUrl+"/uploads/"+"image.jpg");
                    }
                }else{
                    $("#userName").text(userData.username);
                    $("#nameDisplay").text(userData.name);
                    $("#description").text(userData.about);
                    $("#Profile").attr("src", image);
                }

                if(userData.user != null) {
                    if (userData.user.blockStatus == "UNBLOCKED") {
                        $(".blockUser")
                            .html('<i class="bi bi-x-circle me-2"></i>Block')
                            .removeClass("btn-outline-success")
                            .addClass("btn-outline-danger");
                    } else {
                        $(".blockUser")
                            .html('<i class="bi bi-check-circle me-2"></i>Unblock')
                            .removeClass("btn-outline-danger")
                            .addClass("btn-outline-success");
                    }
                }else{
                    $(".blockUser")
                        .html('<i class="bi bi-x-circle me-2"></i>Block')
                        .removeClass("btn-outline-success")
                        .addClass("btn-outline-danger");
                }


                gustId = userData.gustId;




            },

            error: function (err) {
                if(err.status === 401) {
                    alert("Unauthorized. Please log in again.");
                    window.location.href = "/login";
                } else {
                    $(this).hazel('An error occurred. Please try again.', 'danger', 3000);
                }
            }
        });

        $(".blockUser").click(function() {
            if (confirm("Are you sure you want to block this user?")) {
                $.ajax({
                    url: baseUrl + "/api/v1/user/userBlock",
                    method: "POST",
                    contentType: "application/json",
                    data: JSON.stringify({ guestId: gustId }),
                    headers: {
                        "Authorization": token
                    },
                    success: function(response) {
                        alert("User blocked successfully.");
                        location.reload();
                    },
                    error: function(err) {
                        if (err.status === 401) {
                            alert("Unauthorized. Please log in again.");
                            window.location.href = "/login";
                        } else {
                            $(this).hazel('An error occurred. Please try again.', 'danger', 3000);
                        }
                    }
                });
            }
        });
    });

</script>
</body>
</html>
