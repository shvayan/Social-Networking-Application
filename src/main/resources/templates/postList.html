<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HelloApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body {
            background: #f5f6fa;
        }

        .status-header {
            background: #fff;
            border-radius: 0 0 24px 24px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            padding: 1rem 1rem 0.5rem 1rem;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .status-list {
            margin-top: 1rem;
        }

        .status-item {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            padding: 1rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: box-shadow 0.2s;
        }

        .status-item:hover {
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
        }

        .status-avatar {
            width: 56px;
            height: 56px;
            object-fit: cover;
            border-radius: 50%;
            border: 2px solid #0d6efd;
            margin-right: 1rem;
        }

        .status-info h6 {
            margin-bottom: 0.25rem;
        }

        .status-info .text-muted {
            font-size: 0.95rem;
        }

        @media (max-width: 767.98px) {
            .status-header {
                padding: 0.75rem 0.5rem 0.5rem 0.5rem;
            }

            .status-item {
                padding: 0.75rem;
            }

            #chatArea {
                padding-bottom: 110px !important;
                /* enough for input and footer */
            }
        }
    </style>
</head>

<body>
<div class="container py-3">
    <div class="status-header mb-3">
        <h5 class="mb-0">Share your thought</h5>
    </div>
    <div class="status-list" id="chatArea">



        <div id="postContainer"></div>

        <div id="loading" class="text-center" style="display:none;">
            Loading posts...
        </div>


    </div>
</div>
<!-- Add Status Floating Button -->
<!-- Add Status Floating Button -->
<button class="btn btn-primary rounded-circle shadow position-fixed"
        style="bottom: 80px; right: 24px; z-index: 1052; width:56px; height:56px;" title="Add Status" data-bs-toggle="modal"
        data-bs-target="#addStatusModal">
    <i class="bi bi-plus-lg" style="font-size:1.5rem;"></i>
</button>

<!-- Add Status Modal -->
<div class="modal fade" id="addStatusModal" tabindex="-1" aria-labelledby="addStatusModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="addStatusModalLabel">Add Status</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form id="statusForm">
                <div class="modal-body">
                    <div class="mb-3 text-center">
                        <label for="statusImageInput" class="d-inline-block mb-2" style="cursor:pointer;">
                            <img id="statusImagePreview" src="https://img.icons8.com/ios-filled/100/cccccc/image.png" alt="Preview"
                                 style="width:96px;height:96px;object-fit:cover;border-radius:12px;border:2px solid #eee;">
                            <input type="file" id="statusImageInput" accept="image/*" style="display:none;">
                        </label>
                        <div class="small text-muted">Tap to upload image (optional)</div>
                    </div>
                    <div class="mb-3">
                        <label for="statusText" class="form-label">Status Text</label>
                        <textarea class="form-control" id="statusText" rows="3" maxlength="200" placeholder="What's on your mind?"
                                  required></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" onclick="addPost()" class="btn btn-primary">Post Status</button>
                </div>
            </form>
        </div>
    </div>
</div>
<div th:replace="fragments/footer :: footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<div th:replace="fragments/script :: script"></div>

<script>
    let page = 0;
    let size = 5;
    let loading = false;
    let lastPage = false;

    $(document).ready(function () {
        loadPosts();
    });

    function loadPosts() {

        if (loading || lastPage) return;

        loading = true;
        $("#loading").show();

        const token = localStorage.getItem("token");

        $.ajax({
            url: baseUrl + "/api/v1/post/getPosts",
            method: "POST",
            contentType: "application/json",

            headers: {
                "Authorization": token
            },

            data: JSON.stringify({
                page: page,
                size: size
            }),

            success: function (response) {

                const posts = response.data.content;
                lastPage = response.data.last;

                posts.forEach(post => {

                    let image = "";
                    if (post.attachments.length > 0) {
                        image = baseUrl + "/uploads/" + post.attachments[0].fileUrl;
                    }
                    let username = post.username;
                    let userProfileImage = baseUrl + "/uploads/" + post.imageUrl;

                    let upvotes = post.likes.filter(l => l.voteType === "UPVOTE").length;
                    let downvotes = post.likes.filter(l => l.voteType === "DOWNVOTE").length;

                    const card = `  <div  class="card mx-auto mb-4"
             style="max-width: 400px; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); cursor:pointer;"
          >
            <div onclick="guest('${post.username}')" class="card-header bg-white d-flex align-items-center"
                 style="border-top-left-radius: 16px; border-top-right-radius: 16px;">
                <img src="${userProfileImage}" alt="Avatar"
                     style="width:48px; height:48px; border-radius:50%; margin-right:12px;">
                <div>
                    <div style="font-weight: bold; font-size: 1.1rem;">${username}</div>
                    <div style="font-size: 0.95rem; color: #555;">${timeAgo(post.created_at)}</div>
                </div>
                <div class="ms-auto">

<!--                    <i class="bi bi-trash text-danger" style="font-size:1.3rem; color:#888;"></i>-->

                </div>
            </div>
            <img onclick="viewStatus(${post.id})" src="${image}"
                 class="card-img-top" alt="Status Media" style="border-radius:0;">
            <div class="card-body p-3">
                <div class="mb-2" style="font-size:1.05rem;">${post.description}</div>
            </div>
            <div class="card-footer bg-white d-flex justify-content-between align-items-center"
                 style="border-bottom-left-radius: 16px; border-bottom-right-radius: 16px;">
                <div class="d-flex align-items-center">
                    <span onclick="likePost(${post.id})" class="me-2" style="color:#28a745; font-size:1.3rem;"><i class="bi bi-arrow-up-circle"></i></span>
                    <span style="margin-right:18px;" id="upvote${post.id}">${upvotes}</span>
                    <span onclick="unlikePost(${post.id})" class="me-2" style="color:#dc3545; font-size:1.3rem;"><i class="bi bi-arrow-down-circle"></i></span>
                    <span style="margin-right:18px;" id="downvote${post.id}">${downvotes}</span>
                </div>
            </div>
        </div>`;

                    $("#postContainer").append(card);

                });

                page++;
                loading = false;
                $("#loading").hide();
            },
            error: function (err) {
                if(err.status === 401) {
                    alert("Unauthorized. Please log in again.");
                    window.location.href = "/login";
                } else {
                    $(this).hazel('An error occurred. Please try again.', 'danger', 3000);
                }
            }
        });

    }
    $(window).scroll(function () {

        if ($(window).scrollTop() + $(window).height() >= $(document).height() - 100) {
            loadPosts();
        }

    });
    function timeAgo(dateString) {

        const now = new Date();
        const created = new Date(dateString);

        const seconds = Math.floor((now - created) / 1000);

        const minutes = Math.floor(seconds / 60);
        const hours = Math.floor(minutes / 60);
        const days = Math.floor(hours / 24);

        if (seconds < 60) return "Just now";
        if (minutes < 60) return minutes + " minutes ago";
        if (hours < 24) return hours + " hours ago";
        if (days < 7) return days + " days ago";

        return created.toLocaleDateString();
    }


    function likePost(postId) {
        const token = localStorage.getItem("token");

        $.ajax({
            url: baseUrl + "/api/v1/post/like/"+postId,
            method: "POST",
            contentType: "application/json",
            headers: {
                "Authorization": token
            },
            data: JSON.stringify({
                postId: postId
            }),
            success: function (response) {
                location.reload();

                // Optionally update the UI based on the new like/dislike counts

                console.log("Vote successful");
            }
        });
    }
    function unlikePost(postId) {
        const token = localStorage.getItem("token");

        $.ajax({
            url: baseUrl + "/api/v1/post/unlike/"+postId,
            method: "POST",
            contentType: "application/json",
            headers: {
                "Authorization": token
            },
            data: JSON.stringify({
                postId: postId
            }),
            success: function (response) {


                location.reload();

                // Optionally update the UI based on the new like/dislike counts
                console.log("Vote successful");
            }
        });
    }


    function addPost() {
        const token = localStorage.getItem("token");
        const description = $("#statusText").val();
        const imageFile = $("#statusImageInput")[0].files[0];

        if (!description && !imageFile) {


            $(this).hazel('Please enter a status text or select an image.', 'danger', 3000);
            return;
        }

        const formData = new FormData();
        formData.append("content", description);
        if (imageFile) {
            formData.append("attachment", imageFile);
        }

        $.ajax({
            url: baseUrl + "/api/v1/post/create",
            method: "POST",
            headers: {
                "Authorization": token
            },
            processData: false,
            contentType: false,
            data: formData,
            success: function (response) {

                $(this).hazel('Status posted successfully!', 'danger', 3000);

                location.reload();
                $("#addStatusModal").modal('toggle');
            },
            error: function (err) {
                $("#addStatusModal").modal('toggle');
                $(this).hazel('An error occurred. Please try again.', 'danger', 3000);
            }
        });
    }

    function viewStatus(postId) {
        window.location.href = "/postView?id=" + postId;
    }
    function guest(gustName) {
        window.location.href = "/guestProfile?username=" + gustName;
    }




</script>

</body>

</html>
