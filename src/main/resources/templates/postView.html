<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status View</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        /* TikTok-like vertical snap scroll */
        .status-content {
            scroll-snap-type: y mandatory;
            overflow-y: scroll;
            min-height: 100vh;
            max-height: 100vh;
            height: 100vh;
            width: 100vw;
            display: block;
            padding: 0 0 2.5rem 0;
        }
        .status-section {
            scroll-snap-align: start;
            min-height: 100vh;
            max-height: 100vh;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }
        /* Custom scrollbar for status-content */
        .status-content::-webkit-scrollbar {
            width: 8px;
            background: rgba(255,255,255,0.08);
            border-radius: 8px;
        }
        .status-content::-webkit-scrollbar-thumb {
            background: rgba(25, 118, 210, 0.35);
            border-radius: 8px;
            transition: background 0.2s;
        }
        .status-content::-webkit-scrollbar-thumb:hover {
            background: rgba(25, 118, 210, 0.55);
        }
        .status-content {
            scrollbar-width: thin;
            scrollbar-color: #1976d2 rgba(255,255,255,0.08);
        }
        .status-back-btn {
            position: fixed;
            top: 1.2rem;
            left: 1.2rem;
            z-index: 20;
            background: rgba(0,0,0,0.55);
            border: none;
            color: #fff;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.18);
            transition: background 0.18s, color 0.18s;
            cursor: pointer;
        }
        .status-back-btn:hover {
            background: rgba(25, 118, 210, 0.85);
            color: #fff;
        }
        html, body {
            height: 100%;
        }
        body {
            min-height: 100vh;
            height: 100vh;
            margin: 0;
            padding: 0;
            font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
            background: #181c1f;
            position: relative;
            overflow: hidden;
        }
        .status-bg {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            min-width: 100vw;
            min-height: 100vh;
            max-width: 100vw;
            max-height: 100vh;
            object-fit: cover;
            z-index: 1;
            filter: brightness(1.18) saturate(1.08);
        }
        .status-gradient {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 2;
            background: linear-gradient(180deg, rgba(0,0,0,0.05) 0%, rgba(0,0,0,0.45) 60%, rgba(0,0,0,0.85) 100%);
            pointer-events: none;
        }
        .status-content {
            position: relative;
            z-index: 3;
            min-height: 100vh;
            max-height: 100vh;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 0 0 2.5rem 0;
        }
        .status-user {
            display: flex;
            align-items: center;
            margin-bottom: 1.2rem;
            margin-left: 2.2rem;
        }
        .status-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            border: 2.5px solid #ff5722;
            margin-right: 0.9rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.18);
        }
        .status-user-info {
            color: #fff;
        }
        .status-user-info .name {
            font-weight: 700;
            font-size: 1.08rem;
            letter-spacing: 0.01em;
        }
        .status-user-info .location {
            font-size: 0.97rem;
            color: #e0e0e0;
            opacity: 0.85;
        }
        .status-title {
            font-family: 'Montserrat', 'Inter', Arial, sans-serif;
            font-size: 2.5rem;
            font-weight: 900;
            color: #fff;
            margin-left: 2.2rem;
            margin-bottom: 0.2rem;
            line-height: 1.1;
            letter-spacing: -0.01em;
            text-shadow: 0 4px 24px rgba(0,0,0,0.25);
        }
        .status-desc {
            color: #e0e0e0;
            font-size: 1.08rem;
            margin-left: 2.2rem;
            margin-bottom: 2.2rem;
            max-width: 90vw;
            text-shadow: 0 2px 8px rgba(0,0,0,0.18);
        }
        .status-bottom-bar {
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 2.2rem;
            padding: 0.7rem 2.2rem 0.7rem 2.2rem;
            background: linear-gradient(180deg, rgba(0,0,0,0.01) 0%, rgba(0,0,0,0.25) 60%, rgba(0,0,0,0.65) 100%);
            position: fixed;
            left: 0; bottom: 0;
            z-index: 10;
            font-size: 1.25rem;
        }
        .status-bottom-bar .icon-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 1.35rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            cursor: pointer;
            transition: color 0.18s;
            padding: 0.2rem 0.5rem;
            border-radius: 50%;
        }
        .status-bottom-bar .icon-btn.heart {
            color: #ff2e4c;
        }
        .status-bottom-bar .icon-btn.heart.liked {
            color: #e25555;
        }
        .status-bottom-bar .icon-btn:hover {
            color: #ff9800;
        }
        .status-bottom-bar .count {
            font-size: 1.08rem;
            font-weight: 600;
            margin-left: 0.18rem;
            color: #fff;
            opacity: 0.92;
        }
        @media (max-width: 600px) {
            .status-title { font-size: 1.45rem; }
            .status-desc { font-size: 0.97rem; }
            .status-user, .status-title, .status-desc { margin-left: 1rem; }
            .status-bottom-bar { padding: 0.7rem 1rem; font-size: 1.1rem; }
        }
        body {
            background: linear-gradient(135deg, #232526 0%, #414345 100%);
            color: #f5f6fa;
            font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
            min-height: 100vh;
        }
        .card {
            background: rgba(34, 40, 49, 0.98);
            border: none;
            box-shadow: 0 8px 32px rgba(0,0,0,0.35);
            transition: box-shadow 0.2s;
        }
        .card:hover {
            box-shadow: 0 12px 40px rgba(0,0,0,0.45);
        }
        .card-header, .card-footer {
            background: rgba(255,255,255,0.04) !important;
            border: none;
        }
        .card-header {
            border-top-left-radius: 16px;
            border-top-right-radius: 16px;
            padding: 1rem 1.25rem;
        }
        .card-footer {
            border-bottom-left-radius: 16px;
            border-bottom-right-radius: 16px;
            padding: 0.75rem 1.25rem;
        }
        .status-avatar {
            width: 52px;
            height: 52px;
            object-fit: cover;
            border-radius: 50%;
            border: 2.5px solid #1976d2;
            box-shadow: 0 2px 8px rgba(25, 118, 210, 0.15);
            margin-right: 14px;
        }
        .card-img-top {
            border-radius: 0;
            max-height: 320px;
            object-fit: cover;
            background: #222;
        }
        .card-body {
            padding: 1.25rem;
        }
        .mb-2 {
            font-size: 1.13rem;
            color: #e0e0e0;
            text-align: center;
            margin-bottom: 0.7rem !important;
        }
        .card-header div[style*="font-weight: bold"] {
            font-weight: 600 !important;
            font-size: 1.13rem !important;
            color: #f5f6fa;
        }
        .card-header div[style*="font-size: 0.95rem"] {
            color: #b0b3b8 !important;
            font-size: 0.98rem !important;
        }
        .bi-three-dots-vertical {
            color: #b0b3b8 !important;
            cursor: pointer;
            transition: color 0.2s;
        }
        .bi-three-dots-vertical:hover {
            color: #1976d2 !important;
        }
        .btn-link {
            color: #1976d2;
            font-size: 1.3rem;
            transition: color 0.2s, background 0.2s;
            border-radius: 50%;
            padding: 0.35rem;
        }
        .btn-link:hover {
            color: #e25555;
            background: rgba(25, 118, 210, 0.08);
        }
        #like-icon.bi-heart-fill {
            color: #e25555 !important;
            transition: color 0.2s;
        }
        #like-count {
            font-weight: 500;
            color: #f5f6fa;
            font-size: 1.05rem;
        }
        @media (max-width: 767.98px) {
            .container { padding: 0 !important; }
            .card { max-width: 98vw; }
            .card-header, .card-footer { padding: 0.7rem 0.5rem; }
            .card-body { padding: 0.7rem; }
            .mb-2 { font-size: 1rem; }
        }

        @media (max-width: 767.98px) {
            .status-content { padding-top: 56px; padding-bottom: 56px; }
            .status-media { max-width: 98vw; }
        }
        .status-light-overlay {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(255,255,255,0.38);
            z-index: 1.5;
            pointer-events: none;
        }
    </style>
</head>
<body>
<button class="status-back-btn" onclick="window.history.back()" aria-label="Back">
    <i class="bi bi-arrow-left"></i>
</button>
<img class="status-bg" id="imageView" src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1200&q=80" alt="Yoga in Life">
<div class="status-light-overlay"></div>

<div class="status-gradient"></div>
<div class="status-content" id="statusContent">
    <div class="status-section">
        <div class="status-user">
            <img id="userProfile" src="a50b76ca-155b-4243-aafb-21363b0c403b.JPG" alt="Avatar" class="status-avatar">
            <div class="status-user-info">
                <div class="name" id="username">Robert Fox</div>
                <div class="location" id="date"></div>
            </div>
        </div>

        <div class="status-desc" id="desc">To the degree that we look clearly and compassionately at ourselves, we feel confident and fearless about looking into someone else's eyes.</div>
    </div>
    <!-- Example of a second status for snap scroll demonstration -->


</div>

<div class="card-footer bg-white d-flex justify-content-between align-items-center"
     style="border-bottom-left-radius: 16px; border-bottom-right-radius: 16px; background: rgba(255,255,255,0.08) !important; border: none; position: fixed; left: 0; bottom: 0; width: 100vw; z-index: 10; box-shadow: 0 -2px 16px rgba(0,0,0,0.08);">
    <div class="d-flex align-items-center">
        <span class="me-2" style="color:#28a745; font-size:1.3rem;"><i class="bi bi-arrow-up-circle"></i></span>
        <span style="margin-right:18px; color: #fff; font-weight: 600;" id="upvotes">23</span>
        <span class="me-2" style="color:#dc3545; font-size:1.3rem;"><i class="bi bi-arrow-down-circle"></i></span>
        <span style="margin-right:18px; color: #fff; font-weight: 600;" id="downvotes">5</span>
        <span class="me-2" style="color:#17a2b8; font-size:1.3rem;"><i class="bi bi-eye"></i></span>
        <span style="margin-right:0; color: #fff; font-weight: 600;" id="views">102</span>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<!-- removed stray closing div -->

<div th:replace="fragments/script :: script"></div>
<script>
    $(document).ready(function(){
        const  postId =new URLSearchParams(window.location.search).get("id");
        const token = localStorage.getItem("token");

        $.ajax({
            url: baseUrl + "/api/v1/post/getDetiles/"+postId,
            method: "GET",
            contentType: "application/json",

            headers: {
                "Authorization": token
            },

            success: function (response) {
                // alert("User info retrieved successfully: " + );
                const post = response.data;
                let image = "";
                if (post.attachments.length > 0) {
                    image = baseUrl + "/uploads/" + post.attachments[0].fileUrl;
                }
                let username = post.username;
                let userProfileImage = baseUrl + "/uploads/" + post.imageUrl;

                let upvotes = post.likes.filter(l => l.voteType === "UPVOTE").length;
                let downvotes = post.likes.filter(l => l.voteType === "DOWNVOTE").length;
                let views = post.viewer.length;
                var createAt = timeAgo(post.created_at);

                $("#userProfile").attr("src", userProfileImage);
                    $("#imageView").attr("src", image);
                $("#username").text(username);
                $("#date").text(createAt);
                $("#desc").text(post.description);
                $("#upvotes").text(upvotes);
                $("#downvotes").text(downvotes);
                $("#views").text(views);

            },

            error: function (err) {
                if(err.status === 401) {
                    alert("Unauthorized. Please log in again.");
                    window.location.href = "/login";
                } else {
                    $(this).hazel('An error occurred. Please try again.', 'danger', 3000);
                }
            }
        });

        function timeAgo(dateString) {

            const now = new Date();
            const created = new Date(dateString);

            const seconds = Math.floor((now - created) / 1000);

            const minutes = Math.floor(seconds / 60);
            const hours = Math.floor(minutes / 60);
            const days = Math.floor(hours / 24);

            if (seconds < 60) return "Just now";
            if (minutes < 60) return minutes + " minutes ago";
            if (hours < 24) return hours + " hours ago";
            if (days < 7) return days + " days ago";

            return created.toLocaleDateString();
        }


        function likePost(postId) {
            const token = localStorage.getItem("token");

            $.ajax({
                url: baseUrl + "/api/v1/post/like/"+postId,
                method: "POST",
                contentType: "application/json",
                headers: {
                    "Authorization": token
                },
                data: JSON.stringify({
                    postId: postId
                }),
                success: function (response) {
                    location.reload();

                    // Optionally update the UI based on the new like/dislike counts
                    console.log("Vote successful");
                }
            });
        }
        function unlikePost(postId) {
            const token = localStorage.getItem("token");

            $.ajax({
                url: baseUrl + "/api/v1/post/unlike/"+postId,
                method: "POST",
                contentType: "application/json",
                headers: {
                    "Authorization": token
                },
                data: JSON.stringify({
                    postId: postId
                }),
                success: function (response) {


                    location.reload();

                    // Optionally update the UI based on the new like/dislike counts
                    console.log("Vote successful");
                }
            });
        }
    });
</script>
</body>
</html>
